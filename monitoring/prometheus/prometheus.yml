global:
  scrape_interval: 15s           # Default: 15 seconds
  evaluation_interval: 15s       # Evaluate alert rules every 15 seconds
  external_labels:
    environment: 'production'
    monitor: 'infra-platform'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/rules/*.yml"
  # - "rules/alerts.yml"

scrape_configs:

  - job_name: 'prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      # Add job name to exported metrics
      - source_labels: [__address__]
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'
        target_label: instance

  - job_name: 'cadvisor'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'
        target_label: instance

  # Optional: Grafana metrics
  - job_name: 'grafana'
    scrape_interval: 60s
    static_configs:
      - targets: ['grafana:3000']

  # Optional: Docker daemon metrics (requires docker socket)
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['unix:///var/run/docker.sock']
