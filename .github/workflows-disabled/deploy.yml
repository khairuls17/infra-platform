name: Deploy to VPS

on:
  push:
    branches:
      - main
      - deploy
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get commit info
        id: commit
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy script
          ssh -i ~/.ssh/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /opt/infra-platform
            
            # Pull latest changes
            git pull origin main || true
            
            # Update environment if secrets provided
            if [ ! -z "${{ secrets.DOMAIN_NAME }}" ]; then
              sed -i "s/^DOMAIN_NAME=.*/DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}/" .env
            fi
            
            # Deploy with docker-compose
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            
            # Verify deployment
            sleep 10
            docker-compose ps
            
            # Health check
            curl -s -k https://${{ secrets.DOMAIN_NAME }}/health || echo "Health check failed"
          EOF

      - name: Create deployment notification
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = context.job.status;
            const emoji = status === 'success' ? '✅' : '❌';
            const deployEnv = '${{ github.event.inputs.environment || 'production' }}';
            
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: status,
              environment_url: 'https://${{ secrets.DOMAIN_NAME }}',
              description: `Deployment ${status}`,
            }).catch(err => console.log('Note: Deployment status update skipped'));

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Deployment Status",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ job.status == 'success' && '✅ Deployment Successful' || '❌ Deployment Failed' }}*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ steps.commit.outputs.sha_short }}\n*Environment:* ${{ github.event.inputs.environment || 'production' }}"
                  }
                }
              ]
            }
        if: ${{ secrets.SLACK_WEBHOOK != '' }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deployment Failed - ${context.ref_name}`,
              body: `**Deployment Failed**\n\nBranch: ${context.ref_name}\nCommit: ${context.sha.substring(0, 7)}\n\nCheck the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['deployment', 'failed']
            })
