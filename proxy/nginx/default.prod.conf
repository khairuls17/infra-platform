# Production Nginx Configuration
# Supports both main domain + subdomains
# Requires SSL certificates in ./certs/

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main domain - Gateway/Info page
server {
    listen 443 ssl http2;
    server_name ~^(?!grafana\.|portainer\.|status\.).*$;
    
    # SSL certificates
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    
    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    location / {
        default_type text/html;
        return 200 '
            <!DOCTYPE html>
            <html>
            <head>
                <title>Infra Platform</title>
                <style>
                    body { font-family: Arial; margin: 40px; }
                    a { display: block; margin: 10px 0; }
                </style>
            </head>
            <body>
                <h1>Infra Platform - Infrastructure Lab</h1>
                <h2>Services:</h2>
                <ul>
                    <li><a href="https://grafana.${DOMAIN_NAME}">📊 Grafana - Monitoring Dashboard</a></li>
                    <li><a href="https://portainer.${DOMAIN_NAME}">🐳 Portainer - Container Management</a></li>
                    <li><a href="https://status.${DOMAIN_NAME}">⏱️ Uptime Kuma - Status Page</a></li>
                </ul>
                <hr>
                <p><small>Built with Docker • Nginx • Prometheus • Grafana</small></p>
            </body>
            </html>
        ';
    }
    
    location /health {
        default_type text/plain;
        return 200 'OK';
    }
}

# ============================================
# Grafana Subdomain
# ============================================
server {
    listen 443 ssl http2;
    server_name grafana.${DOMAIN_NAME};
    
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    location / {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host grafana:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ============================================
# Portainer Subdomain
# ============================================
server {
    listen 443 ssl http2;
    server_name portainer.${DOMAIN_NAME};
    
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    client_max_body_size 100M;
    
    location / {
        proxy_pass http://portainer:9000/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

